                <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surpresa Cinemática</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem;
            pointer-events: none;
            box-sizing: border-box;
        }

        .title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.5;
        }

        .instruction {
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.4;
            animation: pulse 2.5s infinite alternate;
            margin-bottom: env(safe-area-inset-bottom, 0px);
        }

        @keyframes pulse {
            0% { opacity: 0.2; transform: scale(0.98); }
            100% { opacity: 0.6; transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <div class="ui-container">
        <div class="title">Geometria Viva</div>
        <div class="instruction">Toque e segure em qualquer lugar</div>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let originX = width / 2;
        let originY = height / 2;
        let targetX = width / 2;
        let targetY = height / 2;
        
        let angle = 0;
        let intensity = 0;
        let isPressing = false;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Suporte Mobile (Touch)
        window.addEventListener('touchstart', (e) => {
            isPressing = true;
            const touch = e.touches[0];
            targetX = touch.clientX;
            targetY = touch.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            targetX = touch.clientX;
            targetY = touch.clientY;
        });

        window.addEventListener('touchend', () => {
            isPressing = false;
        });

        // Suporte Desktop (Mouse)
        window.addEventListener('mousedown', (e) => {
            isPressing = true;
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isPressing = false;
        });

        function drawScene() {
            // Efeito de rastro (motion blur)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
            ctx.fillRect(0, 0, width, height);

            // Interpolação suave para seguir o dedo do usuário
            originX += (targetX - originX) * 0.1;
            originY += (targetY - originY) * 0.1;

            // Controla o crescimento/contração do efeito baseado no toque
            if (isPressing) {
                intensity += (100 - intensity) * 0.05;
            } else {
                intensity += (0 - intensity) * 0.03;
            }

            angle += 0.015;

            const linesCount = 12;
            const baseRadius = Math.min(width, height) * 0.2 + intensity;

            for (let i = 0; i < linesCount; i++) {
                const localAngle = angle + (i * (Math.PI * 2 / linesCount));
                
                const s1 = Math.sin(localAngle * 2) * 40;
                const c1 = Math.cos(localAngle * 3) * 40;

                const x1 = originX + Math.cos(localAngle) * (baseRadius + s1);
                const y1 = originY + Math.sin(localAngle) * (baseRadius + c1);

                const x2 = originX + Math.cos(localAngle + Math.PI) * (baseRadius / 2);
                const y2 = originY + Math.sin(localAngle + Math.PI) * (baseRadius / 2);

                // Gradiente cromático baseado na posição e rotação
                const hue = (u) => (angle * 50 + i * (360 / linesCount)) % 360;
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.quadraticCurveTo(originX, originY, x2, y2);
                
                ctx.strokeStyle = `hsla(${hue()}, 80%, 60%, ${0.3 + (intensity / 200)})`;
                ctx.lineWidth = 2 + (intensity / 30);
                ctx.shadowBlur = intensity > 10 ? 15 : 0;
                ctx.shadowColor = `hsla(${hue()}, 80%, 60%, 0.5)`;
                
                ctx.stroke();
            }
            
            ctx.shadowBlur = 0; // Reseta o shadow para performance

            requestAnimationFrame(drawScene);
        }

        drawScene();
    </script>
</body>
</html>
